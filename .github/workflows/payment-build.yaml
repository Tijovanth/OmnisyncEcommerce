name: Payments Service CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'payments-service/**'
      - '.github/workflows/payment-build.yaml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'payments-service/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./payments-service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/omnisync-payments-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/omnisync-payments-service:${{ github.sha }}