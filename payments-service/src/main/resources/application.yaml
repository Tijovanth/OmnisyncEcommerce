server:
  port: 8084

spring:
  application:
    name: payments-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092,localhost:9094,localhost:9096}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: payments-service-group
      properties:
        spring.json.trusted-packages: "com.omnisync_ecommerce"
        delivery.timeout.ms: 10000
        request.timeout.ms: 5000
        linger.ms: 5
    listener:
      observation-enabled: true
    template:
      observation-enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URI:http://localhost:8085}/realms/omnisync-realm

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/payments_db}
    driver: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:tijo}
    password: ${SPRING_DATASOURCE_PASSWORD:ojit1012@}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc.batch_size: 50
        order_updates: true
        order_inserts: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

eureka:
  instance:
    preferIpAddress: true
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_URI:http://localhost:4318}/v1/traces
      export:
        enabled: true
